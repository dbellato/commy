<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bot icon">
  <defs>
    <!-- Uniform diagonal stripe pattern -->
  <pattern
    id="stripes"
    patternUnits="userSpaceOnUse"
    width="10"
    height="36"
    patternTransform="rotate(45)"
  >
    <line
      x1="8" y1="0"
      x2="8" y2="36"
      stroke="#ffffff"
      stroke-width="16"
      stroke-linecap="round"
    />
  </pattern>


    <!-- Bot silhouette -->
    <clipPath id="botShape">
      <!-- Antenna -->
      <rect x="246" y="78" width="20" height="44" rx="10"/>
      <circle cx="256" cy="70" r="14"/>

      <!-- Head -->
      <rect x="144" y="120" width="224" height="176" rx="64"/>

      <!-- Body -->
      <rect x="128" y="256" width="256" height="192" rx="88"/>

      <!-- Side ears -->
      <rect x="104" y="188" width="40" height="112" rx="20"/>
      <rect x="368" y="188" width="40" height="112" rx="20"/>
    </clipPath>
  </defs>

  <!-- Red rounded-square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#E00000"/>

  <!-- White diagonal stripes clipped to bot shape -->
  <g clip-path="url(#botShape)">
    <rect x="0" y="0" width="512" height="512" fill="url(#stripes)"/>
  </g>

  <!-- Friendly face (cut-out) -->
  <circle cx="212" cy="208" r="16" fill="#E00000"/>
  <circle cx="300" cy="208" r="16" fill="#E00000"/>

  <!-- Smile -->
  <path
    d="M214 252 Q256 278 298 252"
    fill="none"
    stroke="#E00000"
    stroke-width="14"
    stroke-linecap="round"
  />
</svg>
